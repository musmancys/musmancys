name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: musmancys

          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2358A6FF&color_dots=%23161B22,%230D1117,%231F6FEB,%233B82F6,%2358A6FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2358A6FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
